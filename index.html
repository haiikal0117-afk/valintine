<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Will You Be My Valentine? 💘</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      height: 100vh;
      background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: url('https://cur.cursors-4u.net/nature/nat-10/nat924.cur'), auto;
    }
    .container {
      text-align: center;
      position: relative;
      z-index: 10;
      padding: 30px;
      max-width: 90%;
    }
    h1 {
      font-size: 3.8rem;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255,105,180,0.8);
      animation: glow 2s ease-in-out infinite alternate;
    }
    .hearts {
      font-size: 2.5rem;
      margin: 20px 0;
      animation: float 6s ease-in-out infinite;
    }
    .buttons {
      margin: 50px 0;
      position: relative;
      display: inline-block;
    }
    button {
      font-size: 1.6rem;
      padding: 18px 60px;
      margin: 0 30px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    #yesBtn {
      background: #ff4757;
      color: white;
      font-weight: bold;
    }
    #yesBtn:hover {
      background: #ff6b81;
      transform: scale(1.15);
      box-shadow: 0 15px 40px rgba(255,71,87,0.5);
    }
    #noBtn {
      background: #57606f;
      color: white;
      position: absolute;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    .sparkle {
      position: absolute;
      font-size: 1.8rem;
      pointer-events: none;
      animation: sparkle 1.5s infinite;
      opacity: 0;
    }
    @keyframes glow {
      from { text-shadow: 0 0 10px #ff9a9e; }
      to   { text-shadow: 0 0 30px #ff4757, 0 0 50px #ff6b81; }
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-15px); }
    }
    @keyframes sparkle {
      0%   { opacity: 0; transform: scale(0.5) translate(0,0); }
      50%  { opacity: 1; transform: scale(1.3) translate(20px,-20px); }
      100% { opacity: 0; transform: scale(0.8) translate(40px,-40px); }
    }
    .question {
      font-size: 1.5rem;
      margin: 40px 0 60px;
      opacity: 0;
      transform: translateY(30px);
      transition: all 1s ease;
    }
    .question.show {
      opacity: 1;
      transform: translateY(0);
    }
    input, textarea {
      font-size: 1.3rem;
      padding: 12px 20px;
      margin: 15px auto;
      width: 80%;
      max-width: 500px;
      border-radius: 30px;
      border: 3px solid #ff9a9e;
      display: block;
      opacity: 0;
      transform: scale(0.9);
      transition: all 0.8s;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #ff4757;
      box-shadow: 0 0 15px rgba(255,71,87,0.5);
    }
    .input.show {
      opacity: 1;
      transform: scale(1);
    }
    #celebrate {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 1.5s;
    }
    #celebrate.show {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div id="celebrate"></div>

  <div class="container">
    <h1>Will You Be My Valentine? 💕</h1>
    <div class="hearts">❤️💖💘🌸✨</div>

    <div class="buttons">
      <button id="yesBtn">YES 😍</button>
      <button id="noBtn">NO 😭</button>
    </div>

    <div id="questions">
      <div class="question" id="q1">kapann dedee balikk lagii kee akuu??? 🥺</div>
      <input type="date" id="dateInput" class="input"/>

      <div class="question" id="q2">kitaa bisaaa mabarr barengg lagii call teruss mainn teruss  🎬</div>
      <input type="text" id="movieInput" placeholder="nama dedee," class="input"/>

      <div class="question" id="q3"> dii jawabb ywa sayngg jgnn dii read doangg begoo</div>b...</div>
      <textarea id="sweetWords" placeholder="kasii ucapann kee akuu dongg walau dikit gaa papaaa💌" rows="4" class="input"></textarea>
      <p></p>class="apaaaa lagiii yaaa biarrr panjanggg gaa tauu jugaa heheee"

      <div style="margin-top:40px;">
        <button id="saveBtn" style="background:#ff9a9e; color:white; padding:15px 40px; font-size:1.4rem; display:none;">
          Simpan Kenangan Ini 💾
        </button>
      </div>
    </div>
  </div>

  <script>
    const yesBtn = document.getElementById('yesBtn');
    const noBtn = document.getElementById('noBtn');
    const questions = document.querySelectorAll('.question');
    const inputs = document.querySelectorAll('.input');
    const saveBtn = document.getElementById('saveBtn');
    const celebrate = document.getElementById('celebrate');

    let questionIndex = 0;

    // NO button kabur-kaburan
    noBtn.addEventListener('mouseover', () => {
      const maxX = window.innerWidth - noBtn.offsetWidth - 100;
      const maxY = window.innerHeight - noBtn.offsetHeight - 100;

      const newX = Math.random() * maxX;
      const newY = Math.random() * maxY;

      noBtn.style.left = newX + 'px';
      noBtn.style.top = newY + 'px';
      noBtn.style.transform = `rotate(${Math.random()*40-20}deg) scale(${0.7 + Math.random()*0.6})`;

      createSparkles(8);
    });

    // Klik YES → mulai pertanyaan
    yesBtn.addEventListener('click', () => {
      yesBtn.style.display = 'none';
      noBtn.style.display = 'none';
      celebrate.classList.add('show');
      launchConfetti();

      setTimeout(() => {
        questions[0].classList.add('show');
        inputs[0].classList.add('show');
      }, 800);

      setTimeout(() => {
        questions[1].classList.add('show');
        inputs[1].classList.add('show');
      }, 2200);

      setTimeout(() => {
        questions[2].classList.add('show');
        inputs[2].classList.add('show');
        saveBtn.style.display = 'inline-block';
      }, 3800);
    });

    // Confetti sederhana pake CSS
    function launchConfetti() {
      for(let i = 0; i < 120; i++) {
        const heart = document.createElement('div');
        heart.className = 'sparkle';
        heart.innerHTML = Math.random() > 0.5 ? '❤️' : '💖';
        heart.style.left = Math.random()*100 + 'vw';
        heart.style.top = Math.random()*100 + 'vh';
        heart.style.animationDelay = Math.random()*2 + 's';
        heart.style.fontSize = (10 + Math.random()*30) + 'px';
        celebrate.appendChild(heart);

        setTimeout(() => heart.remove(), 5000);
      }
    }

    function createSparkles(count) {
      for(let i = 0; i < count; i++) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        s.innerHTML = '✨';
        s.style.left = (noBtn.offsetLeft + noBtn.offsetWidth/2) + 'px';
        s.style.top = (noBtn.offsetTop + noBtn.offsetHeight/2) + 'px';
        s.style.animationDelay = Math.random()*0.5 + 's';
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 2000);
      }
    }

    // Save memory (cuma alert lucu)
    saveBtn.addEventListener('click', () => {
      const date = document.getElementById('dateInput').value || "tanggal rahasia";
      const movie = document.getElementById('movieInput').value || "film apa aja bareng kamu";
      const words = document.getElementById('sweetWords').value || "kamu manis banget";

      alert(`Kenangan tersimpan! 💕\n\nJadian: ${date}\nNonton: ${movie}\nKata manis: "${words}"\n\nAku simpan selamanya ya~ 😘`);
    });
  </script>
</body>
</html>
